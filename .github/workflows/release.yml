name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: StoryTeller ${{ steps.version.outputs.tag }}
          body: |
            ## StoryTeller ${{ steps.version.outputs.tag }}

            ### What's new
            - Pictorial Mode: AI illustrates each page while you listen
            - Reading Tone system: 8 tones (Neutral, Conversational, Academic, Storytelling, Concise, Socratic, Poetic, Humorous)
            - Tone picker in Listening Mode sheet with suggested-tone badges
            - Persistent AI page cache (SQLite) — AI results survive app restarts
            - View Original toggle: switch between AI text and raw PDF while listening
            - Word highlighting suppressed when viewing original (text/audio mismatch prevention)
            - Background 2-page AI prefetch pipeline
            - Theme-matched word highlights (sepia warm / dark purple glow)

            ### Install
            Download `app-release.apk` and install on your Android device.
            > Enable "Install from unknown sources" if prompted.
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
